<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./01.css">
  <title>01_styleSheet</title>
  <style>
    h2 {
      color: rgb(0, 81, 255);
      font-size: 60px;
    }
  </style>
</head>
<body>
<!-- 인라인 스타일: HTML 요소에 'style속성'을 통해 직접 스타일을 적용(잘 안씀) -->
<h1 style="color: yellowgreen;">안녕 CSS</h1>
<!-- 내부 스타일: 'head태그'에 'style태그'를 사용하여 스타일을 적용(잘 안씀) -->
<h2>내부 스타일</h2>

  <!-- 외부 스타일: 별도의 css파일을 작성하고, 'head태그'에 'iink태그'를 사용해서 스타일을 적용(일반적) -->
  <h3>외부 스타일</h3>
</body>
</html>
