<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="03.css">
  <title>Cascading</title>
</head>
<body>
  <h1 class="class-style", id="id-style" style="color: brown;">중요도</h1>
  <!-- style(인라인 스타일)도 쓰지마!  -->

  <div style="color: rgb(157, 255, 0)">
    <h2>상속</h2>
  </div>
</body>
</html>

<!-- (1) h2의 상속 글자의 스타일이 연두색인데 어째서  03.css의 전체 선택자가 적용되는지 모르겠습니다. -->
