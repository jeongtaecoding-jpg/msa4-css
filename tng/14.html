<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./14.css">
  <title>14</title>
</head>
<body>
  <form action="" method="post">
  <fieldset>
            <legend><h1>I want YOU!</h1></legend>
    <label for="name" class="required-star">이름</label>
    <input type="text" id="name" name="name" required>
    <br>

    <label for="age" class="required-star">나이</label>
    <input type="number" id="age" name="age" min="20" required>
    <br>

    <label for="gender" class="required-star">성별</label>
    <input type="radio" name="gender" id="male" value="male" required>
    <label for="male">남자</label>
    <input type="radio" name="gender" id="female" value="female" required>
    <label for="female">여자</label>
    <br>

    <div class="memo">
    <label for="info">요청사항</label>
    <textarea name="info" id="info" cols="30" rows="10" maxlength="10" placeholder="요청 사항 입력"></textarea>
    </div>
    <br>      

    <button type="submit" class="input-hover">보내기</button>

    </fieldset>
  </form>
</body>
</html>
